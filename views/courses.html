<div class="view" id="view-coverage">

  <div class="cv-masthead">
    <div class="cv-masthead-left">
      <div class="eyebrow">❧ Courses</div>
      <h1>Your <em>Courses</em></h1>
    </div>
    <div class="cv-readiness-pill" id="readiness-bar-wrap">
      <div class="cv-rp-score" id="readiness-score">0%</div>
      <div class="cv-rp-right">
        <div class="cv-rp-track"><div class="cv-rp-fill" id="readiness-fill" style="width:0%"></div></div>
        <div class="cv-rp-label" id="readiness-label">Pre-enrollment readiness</div>
        <div class="cv-rp-sub readiness-sublabel">across all courses combined</div>
      </div>
    </div>
  </div>

  <div class="cv-heatmap-box" id="heatmap-wrap">
    <div class="cv-hm-head">
      <span class="cv-hm-title">Coverage heatmap — section density</span>
      <div class="cv-hm-legend">
        <div class="cv-hm-dot" style="background:rgba(107,94,74,.1)"></div><span>0%</span>
        <div class="cv-hm-dot" style="background:rgba(139,58,42,.45);margin-left:6px"></div><span>50%</span>
        <div class="cv-hm-dot" style="background:rgba(139,58,42,.9)"></div><span>100%</span>
      </div>
    </div>
    <div class="heatmap-grid" id="heatmap-grid"></div>
  </div>

  <div class="cv-grid" id="cov-cards"></div>

</div>
